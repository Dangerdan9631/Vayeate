<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vayeate Theme Studio</title>
  </head>
  <body>
    <script>
      (function () {
        var initialAppConfig = window.getElectronInitialAppConfig();
        var scheme = initialAppConfig?.colorScheme ?? 'dark';
        document.documentElement.setAttribute('data-theme', scheme);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
